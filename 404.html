<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>404</title>
        <style>
            body {
                padding: 0;
                margin: 0;
                overflow: hidden;
                background-size: cover;
            }

            p {
                color: white;
                width: 100%;
                text-align: center;
            }

            a {
                color: white;
                transition: all 0.5s;
            }

            a:hover {
                color: #1abcff;
                text-decoration: none;
                transition: all 0.5s;
            }

            .large-header {
                position: absolute;
                width: 100%;
            }

            canvas {
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div class="large-header" id="large-header">
            <p style="font-size: 140px;height: 40px;">Ooops!</p>
            <p style="font-size: 40px;">I'm so sorry to show this page to you, but...</p>
            <p style="font-size: 18px;">
                将在<span id="timer">60</span>s后返回
                <a href="/">Tau's Blog主页</a></p>
            <p style="font-size: 18px;">
                或您可以
                <a href="#" onclick="WinClose()">关闭页面</a>
            </p>
        </div>
        <canvas id="world"></canvas>

        <script>
            var time = 60;
            goindexctime();

            function goindexctime() {
                if (time != -1) {
                    console.log(time)
                    document.getElementById("timer").innerText = time;
                    setTimeout("goindexctime()", 1000);
                } else {
                    goindex();
                }
                time -= 1;
            }

            function goindex() {
                window.location.href = "/"
            }

            function WinClose() {
                if (confirm("您确定要关闭页面吗？") == true) {
                    if (navigator.userAgent.indexOf("MSIE") > 0) {
                        if (navigator.userAgent.indexOf("MSIE 6.0") > 0) {
                            window.opener = null;
                            window.close();
                        } else {
                            window.open('', '_top');
                            window.top.close();
                        }
                    } else if (navigator.userAgent.indexOf("Firefox") > 0) {
                        window.location.href = 'about:blank '; //火狐默认状态非window.open的页面window.close是无效的    
                        //window.history.go(-2);     
                    } else {
                        window.opener = null;
                        window.open('', '_self', '');
                        window.close();
                    }
                }
            }
        </script>
        <script src="./js/convasworld.js"></script>
    </body>
</html>
