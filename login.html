<!DOCTYPE HTML>
<html>
    <head>
        <title>Purple_loginform Website Template | Home :: w3layouts</title>
        <link href="css/loginstyle.css" rel="stylesheet" type="text/css" media="all" />
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <!-- -->
        <script>var __links = document.querySelectorAll('a');function __linkClick(e) { parent.window.postMessage(this.href, '*');} ;for (var i = 0, l = __links.length; i < l; i++) {if ( __links[i].getAttribute('data-t') == '_blank' ) { __links[i].addEventListener('click', __linkClick, false);}}</script>
        <script src="js/jquery.min.js"></script>
        <script>
            $(document).ready(function(c) {
                $('.alert-close').on('click', function(c){
                    $('.message').fadeOut('slow', function(c){
                        $('.message').remove();
                    });
                    window.location.href='/';
                });	  
            });
            function login(){
                var name = $("#txtname").val();
                var pwd = $("#txtpwd").val();
                if(name==""||pwd==""){
                        alert("用户名或密码不能为空！");
                }
                $.ajax({
                           url:'http://139.155.44.213:8080/api/account/login',
                            data:{
                                'name':name,
                                'pwd':pwd
                            },
                            type:'POST',
                            success:function (res) {
                                alert(res);
                                console.log(res);
                            },
                            error:function () {
                                alert("操作超时");
                            }
                        });
            }
        </script>
    </head>
    <body>
        <!-- contact-form -->
        <div class="message warning">
            <div class="inset">
                <div class="login-head">
                    <h1>Login Form</h1>
                    <div class="alert-close"> </div>
                </div>
                <form>
                    <li>
                        <input type="text" id="txtname" class="text" value="Username" onfocus="this.value = '';" onblur="if (this.value == '') {this.value = 'Username';}"><a
                            href="#" class=" icon user"></a>
                    </li>
                    <div class="clear"> </div>
                    <li>
                        <input type="password" id="txtpwd" value="Password" onfocus="this.value = '';" onblur="if (this.value == '') {this.value = 'Password';}">
                        <a href="#" class="icon lock"></a>
                    </li>
                    <div class="clear"> </div>
                    <div class="submit">
                        <input type="submit" onclick="login()" value="Sign in">
                        <h4><a href="#">Lost your Password ?</a></h4>
                        <div class="clear"> </div>
                    </div>

                </form>
            </div>
        </div>
        </div>
        <div class="clear"> </div>
        <!--- footer --->
        <div class="footer">
            <p>Copyright &copy; 2014.</p>
        </div>

    </body>
</html>
